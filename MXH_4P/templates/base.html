{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FourPoint Hotel{% endblock %}</title>
  
  <!-- Base CSS -->
  <link rel="stylesheet" href="{% static 'css/base.css' %}?v=4">
  <link rel="stylesheet" href="{% static 'css/sidebar.css' %}?v=5">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="app-wrapper">
    <!-- Include Sidebar -->
    {% include 'sidebar.html' %}
    
    <!-- Main Content -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  
  <!-- Layout Fix JS -->
  <script src="{% static 'js/layout-fix.js' %}?v=2"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
